document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4b326349-0abf-4e49-a580-370dfb6a7c48\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"441c432c-db3f-4dbe-909e-8b64aba0a35f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2f3fa2a0-a0b3-496a-a08e-43781cb166fc\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\nhtml,body{margin:0;height:100%;background:#0a0a0c;font-family:'Space Grotesk',system-ui,sans-serif}\na{color:#c8f542}a:hover{color:#e2ff7a}\ninput{font-family:'Space Grotesk',system-ui,sans-serif;outline:none}\n@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:relative;display:flex;flex-direction:column;height:100vh;height:100dvh;background:#0a0a0c;color:#f2f2ef;overflow:hidden;max-width:560px;margin:0 auto\">\n  <div style=\"padding:16px 20px 0;display:flex;align-items:baseline;justify-content:space-between\">\n    <div style=\"font-size:20px;font-weight:700;letter-spacing:.04em\">SPINQ<\u002Fdiv>\n    <div style=\"font-size:12px;color:rgba(255,255,255,.5)\">{{ venueName }}<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin:14px 20px 0;padding:16px;background:#16161a;border-radius:16px;display:flex;flex-direction:column;gap:10px\">\n    <div style=\"display:flex;align-items:center;gap:8px\">\n      <div style=\"width:8px;height:8px;border-radius:50%;background:#c8f542\"><\u002Fdiv>\n      <div style=\"font-size:11px;font-weight:600;letter-spacing:.12em;color:#c8f542\">NOW PLAYING<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:2px\">\n      <div style=\"font-size:17px;font-weight:600\">{{ nowTitle }}<\u002Fdiv>\n      <div style=\"font-size:12.5px;color:rgba(255,255,255,.5)\">{{ nowSub }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;padding:14px 20px 0\">\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding-bottom:8px\">\n      <div style=\"font-size:11px;font-weight:600;letter-spacing:.12em;color:rgba(255,255,255,.4)\">UP NEXT<\u002Fdiv>\n      <div style=\"font-size:11px;color:rgba(255,255,255,.35)\">tap ▲ to vote<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ queueEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:26px 0;text-align:center;font-size:13px;color:rgba(255,255,255,.4)\">Queue is empty — request something!<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-for list=\"{{ guestQueue }}\" as=\"q\" hint-placeholder-count=\"4\">\n      <div style=\"display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)\">\n        <div sc-camel-on-click=\"{{ q.onVote }}\" style=\"cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;width:38px;padding:8px 0;border-radius:10px;background:{{ q.voteBg }};border:1px solid {{ q.voteBorder }}\">\n          <div style=\"font-size:11px;color:{{ q.voteFg }}\">▲<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:700;color:{{ q.voteFg }}\">{{ q.votes }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:2px\">\n          <div style=\"font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ q.title }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:rgba(255,255,255,.5)\">{{ q.artist }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ q.boosted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.06em;padding:4px 8px;border-radius:6px;background:rgba(200,245,66,.15);color:#c8f542\">BOOSTED<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"padding:12px 20px;padding-bottom:calc(18px + env(safe-area-inset-bottom))\">\n    <div sc-camel-on-click=\"{{ openSheet }}\" style=\"cursor:pointer;text-align:center;padding:16px 0;border-radius:14px;background:#c8f542;color:#0a0a0c;font-size:16px;font-weight:700\">+ Request a song<\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ sheetOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:#0a0a0c;display:flex;flex-direction:column;padding-top:12px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 20px 12px\">\n        <div style=\"font-size:17px;font-weight:700\">Request a song<\u002Fdiv>\n        <div sc-camel-on-click=\"{{ closeSheet }}\" style=\"cursor:pointer;width:36px;height:36px;border-radius:50%;background:#16161a;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:14px\">✕<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:0 20px 12px\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:12px 14px;background:#1c1c22;border:1px solid rgba(200,245,66,.35);border-radius:14px\">\n          <span style=\"font-size:14px;color:rgba(255,255,255,.4)\">⌕<\u002Fspan>\n          <input value=\"{{ search }}\" sc-camel-on-change=\"{{ onSearch }}\" placeholder=\"Song or artist\" style=\"flex:1;background:transparent;border:none;color:#f2f2ef;font-size:16px;min-width:0\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ noSel }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1;min-height:0;overflow:auto;padding:0 20px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:2px 0 6px\">\n            <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.12em;color:rgba(255,255,255,.35);text-transform:uppercase\">{{ searchHint }}<\u002Fdiv>\n            <sc-if value=\"{{ searching }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:11px;color:#c8f542\">searching…<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-for list=\"{{ results }}\" as=\"song\" hint-placeholder-count=\"4\">\n            <div sc-camel-on-click=\"{{ song.onPick }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06)\">\n              <sc-if value=\"{{ song.art }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"{{ song.artStyle }}\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ song.noArt }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"width:44px;height:44px;border-radius:8px;background:#1c1c22;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-size:11px;color:rgba(255,255,255,.35);flex:none\">{{ song.init }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:2px\">\n                <div style=\"font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ song.title }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ song.artist }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.1);font-size:12.5px;font-weight:600\">Pick<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:26px 0;text-align:center;font-size:13px;color:rgba(255,255,255,.4)\">No matches — try another search<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 20px;padding-bottom:calc(18px + env(safe-area-inset-bottom))\">\n          <div style=\"display:flex;flex-direction:column;gap:12px;padding:18px;background:#16161a;border-radius:18px\">\n            <div style=\"display:flex;align-items:center;gap:14px\">\n              <sc-if value=\"{{ selArt }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"{{ selArtStyle }}\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:3px\">\n                <div style=\"font-size:16px;font-weight:600;line-height:1.25\">{{ selTitle }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:rgba(255,255,255,.5)\">{{ selArtist }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div sc-camel-on-click=\"{{ clearSel }}\" style=\"cursor:pointer;align-self:flex-start;font-size:12px;color:rgba(255,255,255,.45)\">change<\u002Fdiv>\n            <\u002Fdiv>\n            <input value=\"{{ ded }}\" sc-camel-on-change=\"{{ onDed }}\" placeholder=\"Add a dedication (optional)\" style=\"padding:13px;background:#0a0a0c;border:none;border-radius:10px;color:#f2f2ef;font-size:14px\">\n            <div style=\"display:flex;gap:8px\">\n              <sc-for list=\"{{ tipChips }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <div sc-camel-on-click=\"{{ t.onPick }}\" style=\"cursor:pointer;flex:1;text-align:center;padding:12px 0;border-radius:10px;border:1px solid {{ t.border }};background:{{ t.bg }};font-size:13px;color:{{ t.fg }};font-weight:{{ t.weight }}\">{{ t.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:11px;color:rgba(255,255,255,.4);text-align:center\">$5 boosts your song toward the top · tips go straight to the DJ<\u002Fdiv>\n            <div sc-camel-on-click=\"{{ sendRequest }}\" style=\"cursor:pointer;text-align:center;padding:15px 0;border-radius:12px;background:#c8f542;color:#0a0a0c;font-size:15px;font-weight:700\">{{ sendLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;left:20px;right:20px;bottom:110px;padding:13px 16px;background:#1c1c22;border:1px solid rgba(200,245,66,.4);border-radius:12px;font-size:13px;color:#f2f2ef;text-align:center;animation:toastIn .25s ease;box-shadow:0 8px 30px rgba(0,0,0,.5)\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;venueName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Club Velour · Fri&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    now: { title: 'Midnight City', sub: 'M83 · requested by Ana' },\n    queue: [\n      { id: 1, title: 'One More Time', artist: 'Daft Punk', votes: 31, boosted: true },\n      { id: 2, title: 'Dance Yrself Clean', artist: 'LCD Soundsystem', votes: 24, boosted: false },\n      { id: 3, title: 'Heat Waves', artist: 'Glass Animals', votes: 18, boosted: false },\n      { id: 4, title: 'Levitating', artist: 'Dua Lipa', votes: 12, boosted: false },\n    ],\n    voted: {}, sheet: false, search: '', sel: null, ded: '', tip: 0, toast: '',\n    apiResults: null, searching: false, nextId: 200,\n  };\n  catalog = [\n    { title: 'Glass', artist: 'Animal Collective' },\n    { title: 'Heat Waves', artist: 'Glass Animals' },\n    { title: 'One More Time', artist: 'Daft Punk' },\n    { title: 'Blinding Lights', artist: 'The Weeknd' },\n    { title: 'Levitating', artist: 'Dua Lipa' },\n    { title: 'Midnight City', artist: 'M83' },\n  ];\n  searchApple(q) {\n    clearTimeout(this._st);\n    if (!q) { this.setState({ apiResults: null, searching: false }); return; }\n    this._st = setTimeout(async () => {\n      this.setState({ searching: true });\n      try {\n        const r = await fetch('https://itunes.apple.com/search?media=music&entity=song&limit=8&term=' + encodeURIComponent(q));\n        const j = await r.json();\n        if (this.state.search.trim() !== q) return;\n        this.setState({ searching: false, apiResults: j.results.map(t => ({ title: t.trackName, artist: t.artistName, art: t.artworkUrl100 })) });\n      } catch (e) { this.setState({ searching: false, apiResults: null }); }\n    }, 350);\n  }\n  showToast(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._tt);\n    this._tt = setTimeout(() => this.setState({ toast: '' }), 2600);\n  }\n  renderVals() {\n    const s = this.state;\n    const sorted = [...s.queue].sort((a, b) => (b.boosted - a.boosted) || (b.votes - a.votes));\n    const q = s.search.trim().toLowerCase();\n    const base = s.apiResults != null ? s.apiResults\n      : (q ? this.catalog.filter(c => (c.title + ' ' + c.artist).toLowerCase().includes(q)) : this.catalog);\n    const results = base.map(c => ({\n      ...c, init: c.title.slice(0, 2).toUpperCase(), art: c.art || false, noArt: !c.art,\n      artStyle: c.art ? { width: 44, height: 44, borderRadius: 8, flex: 'none', background: '#1c1c22 url(' + c.art + ') center/cover' } : undefined,\n      onPick: () => this.setState({ sel: c }),\n    }));\n    const tipChips = [{ label: 'No tip', v: 0 }, { label: '$2', v: 2 }, { label: '$5 · Boost', v: 5 }].map(t => {\n      const on = s.tip === t.v;\n      return { label: t.label, onPick: () => this.setState({ tip: t.v }),\n        border: on ? '#c8f542' : 'rgba(255,255,255,.15)', bg: on ? 'rgba(200,245,66,.12)' : 'transparent',\n        fg: on ? '#c8f542' : 'rgba(255,255,255,.7)', weight: on ? 600 : 400 };\n    });\n    return {\n      venueName: this.props.venueName ?? 'Club Velour · Fri',\n      nowTitle: s.now.title, nowSub: s.now.sub,\n      queueEmpty: sorted.length === 0,\n      guestQueue: sorted.map(item => {\n        const v = !!s.voted[item.id];\n        return { ...item,\n          voteBg: v ? 'rgba(200,245,66,.12)' : 'transparent',\n          voteBorder: v ? 'rgba(200,245,66,.5)' : 'rgba(255,255,255,.15)',\n          voteFg: v ? '#c8f542' : 'rgba(255,255,255,.7)',\n          onVote: () => this.setState(st => ({\n            voted: { ...st.voted, [item.id]: !v },\n            queue: st.queue.map(x => x.id === item.id ? { ...x, votes: x.votes + (v ? -1 : 1) } : x),\n          })),\n        };\n      }),\n      sheetOpen: s.sheet,\n      openSheet: () => this.setState({ sheet: true, search: '', sel: null, ded: '', tip: 0, apiResults: null }),\n      closeSheet: () => this.setState({ sheet: false }),\n      search: s.search,\n      onSearch: e => { const v = e.target.value; this.setState({ search: v }); this.searchApple(v.trim()); },\n      results, noResults: results.length === 0 && !s.searching, searching: !!s.searching,\n      searchHint: s.apiResults != null ? 'Apple Music catalog' : 'Suggestions',\n      noSel: !s.sel, hasSel: !!s.sel,\n      selTitle: s.sel ? s.sel.title : '', selArtist: s.sel ? s.sel.artist : '',\n      selArt: !!(s.sel && s.sel.art),\n      selArtStyle: s.sel && s.sel.art ? { width: 84, height: 84, borderRadius: 12, flex: 'none', background: '#1c1c22 url(' + s.sel.art.replace('100x100', '300x300') + ') center/cover', boxShadow: '0 6px 24px rgba(0,0,0,.5)' } : undefined,\n      clearSel: () => this.setState({ sel: null }),\n      ded: s.ded, onDed: e => this.setState({ ded: e.target.value }),\n      tipChips,\n      sendLabel: s.tip ? 'Send request · $' + s.tip : 'Send request',\n      sendRequest: () => {\n        if (!s.sel) return;\n        const sel = s.sel, tip = s.tip;\n        this.setState(st => ({\n          queue: [...st.queue, { id: st.nextId, title: sel.title, artist: sel.artist, votes: 1, boosted: tip >= 5 }],\n          nextId: st.nextId + 1, sheet: false, sel: null, ded: '', tip: 0, search: '', apiResults: null,\n          voted: { ...st.voted, [st.nextId]: true },\n        }));\n        this.showToast(tip >= 5 ? 'Request sent — boosted to the top ✓' : 'Request sent to the DJ ✓');\n      },\n      toast: s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
